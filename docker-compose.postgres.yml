services:
  postgres:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: verso
      POSTGRES_USER: verso
      POSTGRES_PASSWORD: change-me
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verso"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  verso:
    image: ghcr.io/kingkill85/verso:latest
    ports:
      - "3000:3000"
    volumes:
      - verso-data:/data
    environment:
      JWT_SECRET: change-me-run-openssl-rand-hex-32
      DB_DRIVER: postgres
      DATABASE_URL: postgresql://verso:change-me@postgres:5432/verso
      STORAGE_DRIVER: local
      STORAGE_PATH: /data/files
      AUTH_MODE: local
      PORT: 3000
      HOST: 0.0.0.0
      NODE_ENV: production
      MAX_UPLOAD_SIZE: 104857600
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  verso-data:
  pgdata:
