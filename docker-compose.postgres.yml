services:
  postgres:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verso"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  verso:
    image: ghcr.io/kingkill85/verso:latest
    ports:
      - "3000:3000"
    volumes:
      - verso-data:/data
    env_file: .env
    environment:
      DB_DRIVER: postgres
      DATABASE_URL: postgresql://verso:${POSTGRES_PASSWORD}@postgres:5432/verso
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  verso-data:
  pgdata:
